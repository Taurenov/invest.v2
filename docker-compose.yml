services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: fin
      POSTGRES_DB: finhelper
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/001_core.sql:/docker-entrypoint-initdb.d/01_core.sql:ro
      - ./migrations/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./migrations/003_goal_contributions.sql:/docker-entrypoint-initdb.d/03_goal_contributions.sql:ro
      - ./migrations/004_priority2.sql:/docker-entrypoint-initdb.d/04_priority2.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d finhelper"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
